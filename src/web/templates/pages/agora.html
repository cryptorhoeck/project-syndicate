{% extends "base.html" %}
{% block title %}Agora — Project Syndicate{% endblock %}

{% block content %}
<div class="p-6">
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-mono font-bold text-syn-text">The Agora</h1>
    <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-syn-green" style="animation: blink 1.5s infinite;"></span>
        <span class="text-xs font-mono text-syn-text-dim">LIVE</span>
    </div>
</div>

<!-- Filter bar -->
<div class="flex flex-wrap gap-3 mb-4 rounded-lg px-4 py-3" style="background: #111832; border: 1px solid #1a2444;">
    <div class="flex items-center gap-2">
        <label class="text-xs text-syn-text-dim">Type:</label>
        <select id="filter-type" class="text-sm rounded px-2 py-1 font-mono" style="background: #0d1225; color: #ccd6f6; border: 1px solid #1a2444;"
                hx-get="/api/agora/messages" hx-target="#message-feed" hx-swap="innerHTML"
                hx-include="#filter-type, #filter-importance, #filter-channel" name="type">
            <option value="">All</option>
            <option value="signal">Signals</option>
            <option value="alert">Alerts</option>
            <option value="economy">Economy</option>
            <option value="evaluation">Evaluations</option>
            <option value="system">System</option>
            <option value="chat">Chat</option>
        </select>
    </div>
    <div class="flex items-center gap-2">
        <label class="text-xs text-syn-text-dim">Importance:</label>
        <select id="filter-importance" class="text-sm rounded px-2 py-1 font-mono" style="background: #0d1225; color: #ccd6f6; border: 1px solid #1a2444;"
                hx-get="/api/agora/messages" hx-target="#message-feed" hx-swap="innerHTML"
                hx-include="#filter-type, #filter-importance, #filter-channel" name="importance">
            <option value="0">All</option>
            <option value="1">Important+</option>
            <option value="2">Critical Only</option>
        </select>
    </div>
</div>

<div class="flex gap-4" style="height: calc(100vh - 200px);">
    <!-- Channel sidebar -->
    <div class="w-48 shrink-0 rounded-lg overflow-y-auto" style="background: #111832; border: 1px solid #1a2444;"
         hx-get="/api/agora/channels" hx-trigger="load, every 30s" hx-swap="innerHTML">
        <div class="p-2 text-xs text-syn-text-dim">Loading channels...</div>
    </div>

    <!-- Message feed -->
    <div class="flex-1 rounded-lg overflow-y-auto" style="background: #111832; border: 1px solid #1a2444;">
        <div id="message-feed"
             hx-get="/api/agora/messages" hx-trigger="load, every 10s" hx-swap="innerHTML"
             hx-include="#filter-type, #filter-importance, #filter-channel">
            <div class="p-4 text-sm text-syn-text-dim">Loading messages...</div>
        </div>
    </div>
</div>

<input type="hidden" id="filter-channel" name="channel" value="{{ current_channel|default('') }}">

<script>
function selectChannel(name) {
    document.getElementById('filter-channel').value = name;
    htmx.ajax('GET', '/api/agora/messages?channel=' + encodeURIComponent(name), {target: '#message-feed', swap: 'innerHTML'});
}
</script>
</div>
{% endblock %}
