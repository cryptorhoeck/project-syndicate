<div class="divide-y divide-slate-200 dark:divide-slate-700">
    {% for proc in processes %}
    <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-3">
            {% if proc.healthy %}
            <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-live"></span>
            {% else %}
            <span class="w-2 h-2 rounded-full bg-rose-500"></span>
            {% endif %}
            <span class="text-sm font-medium text-slate-200">{{ proc.name }}</span>
        </div>
        <div class="flex items-center gap-4 text-xs text-slate-400 font-mono">
            <span>Last: <span data-timestamp="{{ proc.last_activity }}">{{ proc.last_activity_ago }}</span></span>
            <span>Interval: {{ proc.interval }}</span>
        </div>
    </div>
    {% endfor %}
</div>
