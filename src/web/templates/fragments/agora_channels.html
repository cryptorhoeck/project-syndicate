<div class="p-1">
    <button data-channel=""
            onclick="selectChannel('')"
            class="w-full text-left px-3 py-1.5 rounded text-sm text-slate-300 hover:bg-slate-700/40 transition-colors flex justify-between items-center {% if not active_channel %}bg-slate-700/60{% endif %}">
        <span class="font-medium"># all</span>
    </button>
    {% for ch in channels %}
    <button data-channel="{{ ch.name }}"
            onclick="selectChannel('{{ ch.name }}')"
            class="w-full text-left px-3 py-1.5 rounded text-sm text-slate-400 hover:bg-slate-700/40 transition-colors flex justify-between items-center {% if active_channel == ch.name %}bg-slate-700/60 text-slate-200{% endif %}">
        <span class="truncate"># {{ ch.name }}</span>
        {% if ch.message_count and ch.message_count > 0 %}
        <span class="text-[10px] font-mono text-slate-500 ml-1">{{ ch.message_count }}</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
