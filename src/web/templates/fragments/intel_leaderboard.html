{% if scouts %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-xs text-slate-400 font-mono border-b border-slate-700">
                <th class="text-left px-4 py-2">Scout</th>
                <th class="text-right px-4 py-2">Signals</th>
                <th class="text-right px-4 py-2">Endorsed</th>
                <th class="text-right px-4 py-2">Profitable %</th>
            </tr>
        </thead>
        <tbody>
            {% for s in scouts %}
            <tr class="border-b border-slate-700/50 hover:bg-slate-700/30">
                <td class="px-4 py-2 text-agent-scout font-medium">{{ s.name }}</td>
                <td class="px-4 py-2 text-right font-mono text-slate-300">{{ s.total_signals }}</td>
                <td class="px-4 py-2 text-right font-mono text-slate-300">{{ s.endorsed_count }}</td>
                <td class="px-4 py-2 text-right font-mono text-slate-300">{{ "%.0f"|format(s.profitable_pct) }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="p-6 text-center text-slate-500 text-sm">No intel data yet. Scouts haven't posted signals.</div>
{% endif %}
