{% if critics %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-xs text-slate-400 font-mono border-b border-slate-700">
                <th class="text-left px-4 py-2">Critic</th>
                <th class="text-right px-4 py-2">Reviews</th>
                <th class="text-right px-4 py-2">Approve %</th>
            </tr>
        </thead>
        <tbody>
            {% for c in critics %}
            <tr class="border-b border-slate-700/50 hover:bg-slate-700/30">
                <td class="px-4 py-2 text-agent-critic font-medium">{{ c.name }}</td>
                <td class="px-4 py-2 text-right font-mono text-slate-300">{{ c.total_reviews }}</td>
                <td class="px-4 py-2 text-right font-mono text-slate-300">{{ "%.0f"|format(c.approve_pct) }}%</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="p-6 text-center text-slate-500 text-sm">No critic reviews yet.</div>
{% endif %}
