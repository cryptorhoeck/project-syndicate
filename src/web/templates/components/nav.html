<aside class="fixed inset-y-0 left-0 w-64 bg-slate-800 dark:bg-slate-800 border-r border-slate-700 flex flex-col z-50">
    <!-- Logo -->
    <div class="px-5 py-5 border-b border-slate-700">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-live"></span>
            <span class="font-mono font-bold text-sm tracking-wider text-slate-100">PROJECT SYNDICATE</span>
        </div>
        <!-- System status pill -->
        <div class="mt-3"
             hx-get="/api/system/status-pill"
             hx-trigger="load, every 30s"
             hx-swap="innerHTML">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-mono font-medium bg-emerald-500/20 text-emerald-400">
                NOMINAL
            </span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="/agora"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  {% if current_page == 'agora' %}bg-slate-700/60 text-white border-l-2 border-amber-400{% else %}text-slate-300 hover:bg-slate-700/40 hover:text-white{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/>
            </svg>
            Agora
        </a>
        <a href="/leaderboard"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  {% if current_page == 'leaderboard' %}bg-slate-700/60 text-white border-l-2 border-amber-400{% else %}text-slate-300 hover:bg-slate-700/40 hover:text-white{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-4.5A3.375 3.375 0 0012.75 11h-1.5A3.375 3.375 0 007.5 14.25v4.5m6-6V6.75a3 3 0 00-3-3h0a3 3 0 00-3 3v3"/>
            </svg>
            Leaderboard
        </a>
        <a href="/library"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  {% if current_page == 'library' %}bg-slate-700/60 text-white border-l-2 border-amber-400{% else %}text-slate-300 hover:bg-slate-700/40 hover:text-white{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
            </svg>
            Library
        </a>
        <a href="/agents"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  {% if current_page == 'agents' %}bg-slate-700/60 text-white border-l-2 border-amber-400{% else %}text-slate-300 hover:bg-slate-700/40 hover:text-white{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
            </svg>
            Agents
        </a>
        <a href="/system"
           class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  {% if current_page == 'system' %}bg-slate-700/60 text-white border-l-2 border-amber-400{% else %}text-slate-300 hover:bg-slate-700/40 hover:text-white{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
            </svg>
            System
        </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-slate-700 space-y-3">
        {% include "components/theme_toggle.html" %}

        <div class="flex items-center justify-between text-xs text-slate-400">
            <span>Treasury</span>
            <span class="font-mono text-slate-200">C${{ "%.2f"|format(treasury_balance|default(0)) }}</span>
        </div>
        <div class="flex items-center justify-between text-xs text-slate-400">
            <span>Active Agents</span>
            <span class="font-mono text-slate-200">{{ active_agent_count|default(0) }}</span>
        </div>
        <div class="flex items-center justify-between text-xs text-slate-400">
            <span>Regime</span>
            {% set regime = current_regime|default('unknown') %}
            <span class="font-mono text-xs px-1.5 py-0.5 rounded
                {% if regime == 'bull' %}bg-emerald-500/20 text-emerald-400
                {% elif regime == 'bear' %}bg-rose-500/20 text-rose-400
                {% elif regime == 'volatile' %}bg-amber-500/20 text-amber-400
                {% elif regime == 'crab' %}bg-slate-500/20 text-slate-400
                {% else %}bg-slate-500/20 text-slate-400{% endif %}">
                {{ regime|upper }}
            </span>
        </div>
    </div>
</aside>
