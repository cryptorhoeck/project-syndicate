{# Parameters: status (healthy/warning/critical/stale) #}
{% if status == 'healthy' %}
<span class="inline-block w-2 h-2 rounded-full bg-emerald-400 pulse-live" title="Healthy"></span>
{% elif status == 'warning' %}
<span class="inline-block w-2 h-2 rounded-full bg-amber-400" title="Warning"></span>
{% elif status == 'critical' %}
<span class="inline-block w-2 h-2 rounded-full bg-rose-500" title="Critical"></span>
{% else %}
<span class="inline-block w-2 h-2 rounded-full bg-slate-500" title="Stale"></span>
{% endif %}
